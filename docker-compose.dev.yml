version: '3'

services:
  project-management-app:
    build:
      context: .
      target: development
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./index.html:/app/index.html
      - ./vite.config.js:/app/vite.config.js
      - ./package.json:/app/package.json
      # node_modules는 호스트와 충돌할 수 있으므로 볼륨 제외
      - /app/node_modules
